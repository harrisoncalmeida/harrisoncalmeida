<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cafe Menu</title>
    <link rel="stylesheet" type="text/css" href="/CSS/projetocardápio.css"/>
</head>
<body>
    <div class="menu">
        <main>
            <h1>CARDÁPIO DE CAFÉ</h1>
            <p class="established">Est. 2023</p>
            <hr>
            <section>
                <h2>Café</h2>
                    <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/coffee.jpg" alt="coffe icon"/>
                <article class="item">
                    <p class="flavor">Cafézinho</p><p class="price">R$ 3.00</p>
                </article>
                <article class="item">
                    <p class="flavor">Café com leite</p><p class="price">R$ 3.75</p>
                </article>
                <article class="item">
                    <p class="flavor">Espresso</p><p class="price">R$ 3.50</p>
                </article>
                <article class="item">
                    <p class="flavor">Macchiato</p><p class="price">R$ 4.40</p>
                </article>
                <article class="item">
                    <p class="flavor">Cappuccino</p><p class="price">R$ 5.50</p>
                </article>
            </section>
            <h2>Sobremesas</h2>
                <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/pie.jpg" alt="pie icon"/>
            <article class="item">
                <p class="flavor">Donut</p><p class="price">R$ 1.50</p>
            </article>
            <article class="item">
                <p class="flavor">Cherry Pie</p><p class="price">R$ 2.75</p>
            </article>
            <article class="item">
                <p class="flavor">Cheesecake</p><p class="price">R$ 3.00</p>
            </article>
            <article class="item">
                <p class="flavor">Cinamon Roll</p><p class="price">R$ 2.50</p>
            </article>
        </main>
        <hr class="bottom-line">
        <footer>
            <p>
              <a href="" target="">Visite o website</a>
            </p>
            <p class="address">Meu primeiro cardápio WEB</p>
        </footer>
    </div>
</body>
</html>
